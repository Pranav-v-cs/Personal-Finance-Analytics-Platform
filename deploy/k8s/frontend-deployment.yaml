apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-frontend
  labels:
    app: finance-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-frontend
  template:
    metadata:
      labels:
        app: finance-frontend
    spec:
      containers:
      - name: frontend
        image: your-dockerhub-username/finance-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE_URL
          value: "http://finance-backend-service:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: finance-frontend-service
spec:
  selector:
    app: finance-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP